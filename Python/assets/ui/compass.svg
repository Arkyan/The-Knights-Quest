<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
  <defs>
    <radialGradient id="dial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </radialGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="22" cy="22" r="21" fill="none" stroke="#c0a060" stroke-width="1.8"/>
  <circle cx="22" cy="22" r="18.5" fill="url(#dial)" stroke="#7a6030" stroke-width="0.6"/>
  <!-- Cardinal tick marks -->
  <line x1="22" y1="4"  x2="22" y2="8"  stroke="#c0a060" stroke-width="1.5"/>
  <line x1="22" y1="36" x2="22" y2="40" stroke="#c0a060" stroke-width="1.5"/>
  <line x1="4"  y1="22" x2="8"  y2="22" stroke="#c0a060" stroke-width="1.5"/>
  <line x1="36" y1="22" x2="40" y2="22" stroke="#c0a060" stroke-width="1.5"/>
  <!-- North needle (red) -->
  <polygon points="22,8 24,22 22,20 20,22" fill="#cc3344" stroke="#880011" stroke-width="0.5"/>
  <!-- South needle (white) -->
  <polygon points="22,36 24,22 22,24 20,22" fill="#ddddee" stroke="#888899" stroke-width="0.5"/>
  <!-- Center pivot -->
  <circle cx="22" cy="22" r="2.5" fill="#c0a060" stroke="#886600" stroke-width="0.5"/>
  <!-- Cardinal letters -->
  <text x="22" y="17.5" text-anchor="middle" font-size="5" font-weight="bold"
    fill="#FFD700" font-family="serif">N</text>
  <text x="22" y="31"   text-anchor="middle" font-size="5" font-weight="bold"
    fill="#ccccdd" font-family="serif">S</text>
  <text x="10" y="23.5" text-anchor="middle" font-size="5" font-weight="bold"
    fill="#ccccdd" font-family="serif">O</text>
  <text x="34" y="23.5" text-anchor="middle" font-size="5" font-weight="bold"
    fill="#ccccdd" font-family="serif">E</text>
</svg>
