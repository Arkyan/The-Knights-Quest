<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 38" width="24" height="38">
  <defs>
    <linearGradient id="liquid" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6688"/>
      <stop offset="100%" stop-color="#aa0022"/>
    </linearGradient>
    <radialGradient id="glass" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ddf5ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#88bbdd" stop-opacity="0.1"/>
    </radialGradient>
    <linearGradient id="neck" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#88aacc"/>
      <stop offset="50%" stop-color="#cce4ff"/>
      <stop offset="100%" stop-color="#88aacc"/>
    </linearGradient>
  </defs>
  <!-- Cork -->
  <rect x="9" y="1" width="6" height="4" rx="1" fill="#8b5e2a" stroke="#4a2e10" stroke-width="0.5"/>
  <!-- Neck -->
  <rect x="8" y="4.5" width="8" height="6" rx="1" fill="url(#neck)" stroke="#6699bb" stroke-width="0.5"/>
  <!-- Flask body - liquid fill -->
  <path d="M4,16 C4,10 8,10.5 8,10.5 L8,30 C8,34 10,36 12,36 C14,36 16,34 16,30 L16,10.5 C16,10.5 20,10 20,16 C22,20 22,30 20,32 C18,35 15,37 12,37 C9,37 6,35 4,32 C2,30 2,20 4,16Z"
    fill="url(#liquid)" stroke="none"/>
  <!-- Flask body - glass overlay -->
  <path d="M4,16 C4,10 8,10.5 8,10.5 L8,30 C8,34 10,36 12,36 C14,36 16,34 16,30 L16,10.5 C16,10.5 20,10 20,16 C22,20 22,30 20,32 C18,35 15,37 12,37 C9,37 6,35 4,32 C2,30 2,20 4,16Z"
    fill="url(#glass)" stroke="#6699bb" stroke-width="0.8"/>
  <!-- Liquid surface highlight -->
  <ellipse cx="12" cy="16" rx="6" ry="1.5" fill="white" opacity="0.25"/>
  <!-- Shine on glass -->
  <path d="M6,18 C5.5,22 5.5,27 6.5,30" stroke="white" stroke-width="1.5"
    fill="none" stroke-linecap="round" opacity="0.35"/>
  <!-- Sparkle -->
  <circle cx="15" cy="22" r="1" fill="white" opacity="0.4"/>
  <circle cx="14" cy="28" r="0.7" fill="white" opacity="0.3"/>
</svg>
